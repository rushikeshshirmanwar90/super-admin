# Kubernetes Secrets Configuration
# IMPORTANT: Do not commit this file with actual values
# Use kubectl to create secrets from command line instead

apiVersion: v1
kind: Secret
metadata:
  name: super-admin-secrets
  namespace: super-admin
type: Opaque
stringData:
  # Base configuration
  NODE_ENV: "production"
  PORT: "8000"
  HOSTNAME: "0.0.0.0"
  
  # API Configuration
  NEXT_PUBLIC_API_URL: "https://xsite.tech"
  NEXT_PUBLIC_DOMAIN: "https://xsite.tech"
  
  # Add other sensitive variables here
  # DATABASE_URL: "your_database_url"
  # JWT_SECRET: "your_jwt_secret"
  # API_KEY: "your_api_key"

---
# Alternative: Create secrets from command line (Recommended)
# kubectl create secret generic super-admin-secrets \
#   --from-literal=NODE_ENV=production \
#   --from-literal=PORT=8000 \
#   --from-literal=HOSTNAME=0.0.0.0 \
#   --from-literal=NEXT_PUBLIC_API_URL=https://xsite.tech \
#   --from-literal=NEXT_PUBLIC_DOMAIN=https://xsite.tech \
#   -n super-admin

# Or create from .env file:
# kubectl create secret generic super-admin-secrets \
#   --from-env-file=.env.production \
#   -n super-admin
